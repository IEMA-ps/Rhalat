<style>
  :root{
    --ink:#1E2A2A; --muted:#75817C; --bg:#F5F1E6; --surface:#FFFFFF; --border:#E6DFCC;
    --primary:#0D6E63; --primary-dark:#083F38; --primary-light:#E1EFEC;
    --accent:#DD8A3E; --accent-dark:#A9611F; --accent-light:#FBEEDD;
    --danger:#BE4438; --danger-light:#F7E2DE;
    --success:#2E8858; --success-light:#DEEFE4;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--ink);
    margin:0; padding-bottom:74px; min-height:100vh;
  }
  h1,h2,h3,.trip-title,.btn,label,.tab{font-family:'Cairo',sans-serif;}
  h3{ font-weight:800; color:var(--ink); position:relative; padding-bottom:12px; margin:0 0 4px;}
  h3::after{
    content:""; display:block; position:absolute; right:0; bottom:2px;
    width:44px; height:0; border-top:3px dashed var(--accent);
  }
  header{
    background:linear-gradient(120deg,var(--primary-dark),var(--primary));
    color:#fff; padding:16px 18px; position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 2px 10px rgba(8,63,56,.25);
  }
  header h1{font-size:18px; margin:0; font-weight:800; display:flex; align-items:center;}
  header .user-badge{font-size:12px; opacity:.92;}
  .container{max-width:640px; margin:0 auto; padding:16px;}
  .card{
    background:var(--surface); border-radius:16px; padding:16px; margin-bottom:14px;
    box-shadow:0 2px 10px rgba(30,42,42,.06); border:1px solid var(--border);
  }
  .btn{
    display:inline-block; background:var(--primary); color:#fff; border:none;
    padding:12px 18px; border-radius:12px; font-family:inherit; font-weight:700;
    font-size:14px; cursor:pointer; text-align:center; transition:.15s;
  }
  .btn:hover{background:var(--primary-dark);}
  .btn.secondary{background:#fff; color:var(--primary); border:1.5px solid var(--primary);}
  .btn.danger{background:var(--danger);}
  .btn.accent{background:var(--accent); color:#fff;}
  .btn.block{width:100%;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  input, select, textarea{
    width:100%; padding:11px; border:1.5px solid var(--border); border-radius:10px;
    font-family:inherit; font-size:14px; margin-bottom:10px; background:#fff; color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--primary); outline-offset:1px; border-color:var(--primary);}
  label{font-size:13px; font-weight:700; color:var(--muted); display:block; margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .tabbar{
    position:fixed; bottom:0; right:0; left:0; background:#fff; display:flex;
    border-top:1px solid var(--border); z-index:50; box-shadow:0 -2px 10px rgba(30,42,42,.08);
  }
  .tab{
    flex:1; text-align:center; padding:10px 4px 8px; font-size:11px; color:var(--muted);
    cursor:pointer; border:none; background:none; font-weight:700;
  }
  .tab.active{color:var(--primary);}
  .tab .icon{font-size:19px; display:block; margin-bottom:2px;}
  .badge{
    display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
  }
  .badge.pending{background:var(--accent-light); color:var(--accent-dark);}
  .badge.approved{background:var(--success-light); color:var(--success);}
  .badge.rejected{background:var(--danger-light); color:var(--danger);}
  .badge.paid{background:var(--success-light); color:var(--success);}
  .badge.unpaid{background:var(--danger-light); color:var(--danger);}
  .badge.partial{background:var(--accent-light); color:var(--accent-dark);}
  .badge.muted{background:#EEEAE0; color:var(--muted);}
  .star-rate{display:flex; gap:4px; font-size:26px; cursor:pointer; user-select:none;}
  .star-rate span{color:#DDD6C4; transition:color .15s;}
  .star-rate span.filled{color:var(--accent);}
  .trip-title{font-size:16px; font-weight:800; margin:0 0 4px; color:var(--ink);}
  .trip-meta{font-size:13px; color:var(--muted); margin-bottom:8px; line-height:1.8;}
  .trip-meta b{color:var(--ink);}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .row > *{flex:1; min-width:120px;}
  .empty{text-align:center; color:var(--muted); padding:30px 10px; font-size:14px;}
  .toast{
    position:fixed; top:70px; right:16px; left:16px; max-width:600px; margin:0 auto;
    background:var(--ink); color:#fff; padding:12px 16px; border-radius:10px; font-size:13px;
    z-index:100; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  .toast.error{background:var(--danger);}
  .toast.success{background:var(--success);}
  .hidden{display:none !important;}
  .divider{border:none; border-top:1px dashed var(--border); margin:14px 0;}
  .link-box{
    background:var(--primary-light); border:1px dashed var(--primary); border-radius:10px; padding:10px;
    font-size:12px; word-break:break-all; color:var(--primary-dark); margin-bottom:8px;
  }
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center;}
  .stat .num{font-size:22px; font-weight:800; color:var(--primary); font-family:'Cairo',sans-serif;}
  .stat .lbl{font-size:12px; color:var(--muted); margin-top:2px;}
  .loading{text-align:center; padding:40px; color:var(--muted);}
  .auth-box{max-width:400px; margin:20px auto 0;}
  .auth-box h2{text-align:center; font-weight:800;}
  .switch-link{text-align:center; font-size:13px; color:var(--primary); cursor:pointer; margin-top:8px; font-weight:700;}
  .commission-form{background:var(--accent-light); border:1px solid #F0D5AE; border-radius:10px; padding:10px; margin-top:8px;}
  .header-logo{height:28px; width:28px; object-fit:cover; border-radius:6px; vertical-align:middle; margin-left:6px;}
  .landing-hero{
    text-align:center; padding:34px 16px 28px; margin:-16px -16px 18px;
    background:
      radial-gradient(circle at 18% 18%, rgba(13,110,99,.10), transparent 55%),
      radial-gradient(circle at 85% 12%, rgba(221,138,62,.14), transparent 45%);
    border-bottom:1px dashed var(--border);
  }
  .landing-logo-wrap{
    width:104px; height:104px; margin:0 auto 16px; border-radius:26px;
    background:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 22px rgba(13,110,99,.18); border:1px solid var(--border);
  }
  .landing-logo{height:78px; width:78px; object-fit:contain; border-radius:16px;}
  .landing-hero h2{margin:0 0 12px; font-size:24px; font-weight:800; position:relative; display:inline-block;}
  .landing-hero h2::after{
    content:""; display:block; margin:10px auto 0; width:64px; height:0;
    border-top:3px dashed var(--accent);
  }
  .landing-hero p{color:var(--muted); font-size:14px; margin:0 auto; line-height:1.8; max-width:360px;}
  .trip-img{width:100%; height:160px; object-fit:cover; border-radius:12px; margin-bottom:10px; display:block; background:var(--primary-light);}
  .trip-img-wrap{position:relative; margin-bottom:10px;}
  .trip-img-wrap .trip-img{margin-bottom:0;}
  .price-badge{
    position:absolute; top:10px; left:10px; background:rgba(8,63,56,.88); color:#fff;
    padding:5px 13px; border-radius:999px; font-size:12px; font-weight:800; font-family:'Cairo',sans-serif;
  }
  .seats-pill{
    position:absolute; bottom:10px; right:10px; background:rgba(255,255,255,.94); color:var(--ink);
    padding:4px 11px; border-radius:999px; font-size:11px; font-weight:700; box-shadow:0 2px 6px rgba(0,0,0,.12);
  }
  .map-link{color:var(--primary); font-weight:700; text-decoration:none; font-size:13px;}
  .admin-subnav{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; margin-bottom:4px;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .admin-subnav::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto; padding:9px 16px; border-radius:999px; border:1.5px solid var(--border);
    background:#fff; color:var(--muted); font-family:'Cairo',sans-serif; font-weight:700; font-size:13px;
    white-space:nowrap; cursor:pointer;
  }
  .pill.active{background:var(--primary); border-color:var(--primary); color:#fff;}
  .seat-map{display:flex; flex-direction:column; align-items:center; gap:8px; margin:10px 0;}
  .seat-row{display:flex; gap:7px; justify-content:center;}
  .aisle-gap{width:22px;}
  .seat{
    width:38px; height:38px; border-radius:9px; border:1.5px solid var(--border);
    font-family:'Cairo',sans-serif; font-weight:700; font-size:13px; cursor:pointer; background:#fff; color:var(--ink);
  }
  .seat.available{background:var(--primary-light); color:var(--primary-dark); border-color:var(--primary-light);}
  .seat.selected{background:var(--primary); color:#fff; border-color:var(--primary);}
  .seat.taken{background:var(--danger-light); color:var(--danger); border-color:var(--danger-light); cursor:not-allowed;}
  .seat-legend{display:flex; gap:16px; justify-content:center; font-size:12px; color:var(--muted); margin:8px 0;}
  .seat-legend .dot{display:inline-block; width:12px; height:12px; border-radius:4px; margin-left:5px; vertical-align:middle;}
  .seat-legend .dot.available{background:var(--primary-light); border:1px solid var(--primary);}
  .seat-legend .dot.selected{background:var(--primary);}
  .seat-legend .dot.taken{background:var(--danger-light); border:1px solid var(--danger);}
</style>
</head>
<body>

<header>
  <h1 id="siteTitle">🧳 نظام الرحلات</h1>
  <div id="userBadge" class="user-badge hidden">
    <span id="userNameLbl"></span> · <a id="logoutBtn" style="color:#fff; cursor:pointer; text-decoration:underline;">خروج</a>

<script>
/* =========================================================
   إعدادات Firebase — لازم تستبدل القيم دي ببيانات مشروعك
   من Firebase Console > Project Settings > Your apps
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCj9aLy41Q0K3A3XK-pTqHQCoZn3HGYU98",
  authDomain: "zzzz-ba6f8.firebaseapp.com",

  storageBucket: "zzzz-ba6f8.firebasestorage.app",

  measurementId: "G-TQLDZC2QJ3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// إعدادات Cloudinary (لرفع الصور مجانًا بدون ترقية Firebase لباقة مدفوعة)
const CLOUDINARY_CLOUD_NAME = "hglkbvu5";
const CLOUDINARY_UPLOAD_PRESET = "hommfb4n";

// ضع هنا إيميلات الأدمن (بالإضافة إلى role:"admin" في Firestore)
const ADMIN_EMAILS = ["iemasam89@gmail.com"];

let currentUser = null;
let currentUserData = null;
let currentTab = "trips";
let tripsCache = [];
let bookingsCache = [];
let refParam = null;
let unsubTrips = null;
let unsubBookings = null;
let unsubUserDoc = null;
let unsubMyOrgRequest = null;
let unsubOrgRequests = null;
let myOrganizerRequest = null;
let organizerRequestsCache = [];
let allUsersCache = [];
let allContactsCache = [];
let contactsCache = [];
let unsubContacts = null;
let authMode = 'login';
let adminSubTab = 'overview';
let pendingTripImageUrl = '';
let pendingLogoUrl = null; // null = مفيش تغيير، نص = رابط شعار جديد اترفع
let pendingIdFrontUrl = '';
let pendingIdBackUrl = '';
let pendingSelfieUrl = '';
const PHONE_RE = /^01[0125][0-9]{8}$/;

// محافظات مصر — قائمة ثابتة تظهر في التسجيل واختيار المدن بالأدمن
const EGYPT_GOVERNORATES = [
  "القاهرة","الجيزة","الإسكندرية","الدقهلية","البحر الأحمر","البحيرة","الفيوم","الغربية",
  "الإسماعيلية","المنوفية","المنيا","القليوبية","الوادي الجديد","السويس","أسوان","أسيوط",
  "بني سويف","بورسعيد","دمياط","الشرقية","جنوب سيناء","كفر الشيخ","مطروح","الأقصر",
  "قنا","شمال سيناء","سوهاج"
];

let citiesCache = [];
let unsubDiscounts = null;
let discountCodesCache = [];
let appliedDiscount = null;

let unsubWaitlist = null;
let waitlistCache = [];       // انتظار المستخدم الحالي بس
let allWaitlistCache = [];    // كل قوائم الانتظار (للأدمن)
let unsubAllWaitlist = null;
let ratingsCache = [];        // كل التقييمات (عامة عشان يظهر المتوسط)
let ticketParam = null;
let ticketViewActive = false; // true وإحنا واقفين على صفحة تذكرة/مسح تذكرة، عشان مانفقدش الصفحة بسبب تحديث لايف

// التقييمات عامة عشان يظهر متوسط تقييم كل رحلة حتى للزوار
db.collection('tripRatings').onSnapshot(snap=>{
  ratingsCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
  if(currentTab==='trips' && !ticketViewActive) renderTrips();
}, ()=>{});

(function readTicket(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('ticket')) ticketParam = params.get('ticket');
})();

// المدن بتتضاف من الأدمن فقط، لكن لازم تتحمّل حتى قبل تسجيل الدخول عشان تظهر في فورم إنشاء الحساب
db.collection('cities').onSnapshot(snap=>{
  citiesCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
  if(!currentUser) updateSignupCityOptions();
  else if(currentTab==='admin') renderTab();
}, ()=>{});

function uploadImageFile(file, folder, statusElId, previewElId){
  const statusEl = document.getElementById(statusElId);
  const previewEl = document.getElementById(previewElId);
  if(!file.type.startsWith('image/')){ toast('الملف لازم يكون صورة', 'error'); return Promise.resolve(null); }
  if(file.size > 5*1024*1024){ toast('حجم الصورة أكبر من 5 ميجا', 'error'); return Promise.resolve(null); }
  if(statusEl) statusEl.textContent = 'جاري رفع الصورة... 0%';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  formData.append('folder', folder);

  return new Promise((resolve)=>{
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable && statusEl){
        const pct = Math.round((e.loaded/e.total)*100);
        statusEl.textContent = `جاري رفع الصورة... ${pct}%`;
      }
    };
    xhr.onload = ()=>{
      let res = null;
      try{ res = JSON.parse(xhr.responseText); }catch(e){}
      if(xhr.status>=200 && xhr.status<300 && res && res.secure_url){
        if(statusEl) statusEl.textContent = 'تم رفع الصورة ✅';
        if(previewEl){ previewEl.src = res.secure_url; previewEl.classList.remove('hidden'); }
        resolve(res.secure_url);
      } else {
        if(statusEl) statusEl.textContent = '';
        toast('تعذر رفع الصورة، حاول تاني', 'error');
        resolve(null);
      }
    };
    xhr.onerror = ()=>{
      if(statusEl) statusEl.textContent = '';
      toast('تعذر رفع الصورة، تأكد من الاتصال بالإنترنت', 'error');
      resolve(null);
    };
    xhr.send(formData);
  });
}

let siteSettings = {
  siteName: 'نظام الرحلات',
  logoUrl: '',
  heroTitle: 'سافر معانا واكسب من كل صديق يحجز',
  heroSubtitle: 'اختار رحلتك، احجز مكانك، وشارك رابطك مع أصحابك، واكسب عمولة من كل حجز يتم من خلاله.',
  bookingMessageTemplate: 'مرحبًا {الاسم} 👋\nتم تسجيل حجزك في رحلة {الرحلة} بعدد {المقاعد} مقعد.\nالمبلغ المطلوب: {المبلغ} جنيه.\nبرجاء تحويل المبلغ تحت الحساب لتأكيد الحجز.\nشكرًا لثقتك بنا 🌹'
};

function applySiteSettings(){
  const h1 = document.getElementById('siteTitle');
  if(!h1) return;
  h1.innerHTML = siteSettings.logoUrl
    ? `<img src="${escapeHtml(siteSettings.logoUrl)}" alt="logo" class="header-logo">${escapeHtml(siteSettings.siteName)}`
    : `🧳 ${escapeHtml(siteSettings.siteName)}`;
}

db.collection('settings').doc('site').onSnapshot(doc=>{
  if(doc.exists) siteSettings = {...siteSettings, ...doc.data()};
  applySiteSettings();
  if(!currentUser) renderAuth(authMode);
}, ()=>{ applySiteSettings(); });

// ---- قراءة رابط الإحالة من العنوان ----
(function readRef(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('ref')) refParam = params.get('ref');
})();

function toast(msg, type=""){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastHolder').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

function fmtDate(d){
  try{ return new Date(d).toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'}); }
  catch(e){ return d; }
}

// ---------------- AUTH ----------------
auth.onAuthStateChanged(async (user)=>{
  currentUser = user;
  if(user){
    const userRef = db.collection('users').doc(user.uid);
    let doc = await userRef.get();
    if(!doc.exists){
      const isAdmin = ADMIN_EMAILS.includes(user.email);
      currentUserData = {
        name: user.email.split('@')[0], email: user.email,
        role: isAdmin ? 'admin' : 'user', createdAt: Date.now()
      };
      await userRef.set(currentUserData);
    } else {
      currentUserData = doc.data();
      if(ADMIN_EMAILS.includes(user.email) && currentUserData.role !== 'admin'){
        currentUserData.role = 'admin';
        await userRef.update({role:'admin'});
      }
    }
    document.getElementById('userBadge').classList.remove('hidden');
    document.getElementById('userNameLbl').textContent = currentUserData.name || user.email;
    document.getElementById('tabbar').classList.remove('hidden');
    updateTabVisibility();

    // استماع مستمر لمستند المستخدم عشان لو الأدمن وافق على طلب الإشراف يتحدث فورًا من غير logout
    if(unsubUserDoc) unsubUserDoc();
    unsubUserDoc = userRef.onSnapshot(d=>{
      if(d.exists){
        currentUserData = d.data();
        document.getElementById('userNameLbl').textContent = currentUserData.name || user.email;
        updateTabVisibility();
        renderTab();
      }
    });

    loadAllData();

    if(ticketParam && (currentUserData.role === 'admin' || currentUserData.role === 'organizer')){
      const tid = ticketParam;
      ticketParam = null;
      setTimeout(()=> showTicketLookup(tid), 400);
    } else if(ticketParam){
      const tid = ticketParam;
      ticketParam = null;
      setTimeout(async ()=>{
        try{
          const doc = await db.collection('bookings').doc(tid).get();
          if(doc.exists && doc.data().participantUid === currentUser.uid){
            currentTab = 'mine';
            showMyTicket(tid);
          }
        }catch(e){}
      }, 400);
    }
  } else {
    currentUserData = null;
    if(unsubTrips){ unsubTrips(); unsubTrips = null; }
    if(unsubBookings){ unsubBookings(); unsubBookings = null; }
    if(unsubUserDoc){ unsubUserDoc(); unsubUserDoc = null; }
    if(unsubMyOrgRequest){ unsubMyOrgRequest(); unsubMyOrgRequest = null; }
    if(unsubOrgRequests){ unsubOrgRequests(); unsubOrgRequests = null; }
    if(unsubContacts){ unsubContacts(); unsubContacts = null; }

// معرّف ثابت للمدينة عشان مانضيفش نفس المدينة مرتين حتى لو ناس مختلفة ضافوها في نفس اللحظة
function cityDocId(governorate, name){
  return `${governorate}_${name}`.trim().replace(/[\/\s]+/g, '_');
}

// يتأكد إن المدينة مسجّلة في النظام؛ لو مش موجودة يضيفها وتبقى ثابتة لكل المستخدمين بعد كده
async function ensureCityExists(governorate, name){
  name = name.trim();
  const existing = citiesCache.find(c=>c.governorate===governorate && c.name.trim()===name);
  if(existing) return existing.name;
  try{
    await db.collection('cities').doc(cityDocId(governorate, name)).set({governorate, name, createdAt: Date.now()});
  }catch(e){ /* على الأغلب حد تاني ضافها في نفس اللحظة - نتجاهل ونكمل بنفس الاسم */ }
  return name;
}

function translateAuthError(e){
  const map = {
    'auth/user-not-found':'المستخدم غير موجود',
    'auth/wrong-password':'كلمة المرور غير صحيحة',
    'auth/email-already-in-use':'البريد الإلكتروني مستخدم بالفعل',
    'auth/weak-password':'كلمة المرور ضعيفة (6 أحرف على الأقل)',
    'auth/invalid-email':'البريد الإلكتروني غير صحيح'
  };
  return map[e.code] || 'حدث خطأ، حاول مرة أخرى';
}

        <span class="seats-pill">🪑 ${Math.max(seatsLeft,0)} متاح</span>
      </div>
      <div class="trip-title">📍 ${escapeHtml(t.destination)} ${avg ? `<span class="badge muted">⭐ ${avg.avg} (${avg.count})</span>` : ''}</div>
      <div class="trip-meta">
        <div>📅 <b>${fmtDate(t.date)}</b></div>
        <div>🚌 الباص: <b>${t.busType || t.seatsTotal} راكب</b></div>
        ${t.meetingPoint ? `<div>📍 نقطة التجمع: <b>${escapeHtml(t.meetingPoint)}</b></div>` : ''}
        ${t.meetingTime ? `<div>🕐 ساعة التجمع: <b>${escapeHtml(t.meetingTime)}</b></div>` : ''}

              : `<button class="btn accent block" onclick="joinWaitlist('${t.id}')">⏳ انضم لقائمة الانتظار</button>`)
          : `<button class="btn block" onclick="openBooking('${t.id}')">احجز الآن</button>`}
        <button class="btn secondary block" onclick="shareTrip('${t.id}')">🔗 مشاركة</button>

async function shareTrip(tripId){
  const t = tripsCache.find(x=>x.id===tripId);
  const url = `${window.location.origin}${window.location.pathname}?ref=${currentUser.uid}&trip=${tripId}`;
  const shareText = t ? `شوف رحلة ${t.destination} دي، احجز من هنا 👇` : 'شوف الرحلة دي، احجز من هنا 👇';
  if(navigator.share){
    try{
      await navigator.share({ title: t ? `رحلة ${t.destination}` : 'رحلة', text: shareText, url });
    }catch(e){ /* المستخدم لغى شاشة المشاركة - مفيش داعي لأي رسالة */ }
  } else {
    try{
      await navigator.clipboard.writeText(url);
      toast('تم نسخ رابط المشاركة! شاركه وهتاخد عمولتك من كل حجز', 'success');
    }catch(e){ toast('تعذر نسخ الرابط', 'error'); }
  }
}

let currentBookingTripId = null;
let selectedSeatNumbers = [];

function generateSeatLayout(total){
  const rows = [];
  let remaining = total;
  let seatNum = 1;
  while(remaining > 0){
    const rowSize = remaining >= 5 ? 4 : remaining;
    const row = [];
    for(let i=0; i<rowSize && remaining>0; i++){ row.push(seatNum++); remaining--; }
    rows.push(row);
  }
  return rows;
}

function renderSeatMapMarkup(total, takenSeats, selected){
  const rows = generateSeatLayout(total);
  return rows.map(row=>{
    const cells = row.map((num, idx)=>{
      const gap = (row.length===4 && idx===2) ? `<div class="aisle-gap"></div>` : '';
      const taken = takenSeats.includes(num);
      const isSelected = selected.includes(num);
      const cls = taken ? 'seat taken' : isSelected ? 'seat selected' : 'seat available';
      return `${gap}<button type="button" class="${cls}" ${taken?'disabled':''} onclick="toggleSeatSelect(${num})">${num}</button>`;
    }).join('');
    return `<div class="seat-row">${cells}</div>`;
  }).join('');
}

function refreshSeatMapUI(){
  const t = tripsCache.find(x=>x.id===currentBookingTripId);
  if(!t) return;
  const total = t.busType ? parseInt(t.busType) : t.seatsTotal;
  const taken = t.bookedSeats || [];
  const holder = document.getElementById('seatMapHolder');
  if(holder) holder.innerHTML = renderSeatMapMarkup(total, taken, selectedSeatNumbers);
  const summary = document.getElementById('seatSummary');
  if(summary){
    const count = selectedSeatNumbers.length;
    if(count>0){
      const rawAmount = count*(t.price||0);
      const discountAmount = calcDiscountAmount(rawAmount);
      const finalAmount = Math.max(rawAmount - discountAmount, 0);
      summary.innerHTML = `اخترت ${count} مقعد (${[...selectedSeatNumbers].sort((a,b)=>a-b).join('، ')})<br>الإجمالي: ${discountAmount>0 ? `<s style="opacity:.6;">${rawAmount}</s> ` : ''}${finalAmount} جنيه`;
    } else {
      summary.textContent = 'اختار مقعد واحد على الأقل من المخطط';
    }
  }
}

function toggleSeatSelect(num){
  const idx = selectedSeatNumbers.indexOf(num);
  if(idx>=0) selectedSeatNumbers.splice(idx,1);
  else selectedSeatNumbers.push(num);
  refreshSeatMapUI();
}

      <div class="trip-meta" id="seatSummary" style="text-align:center; font-weight:700; margin-top:10px;">اختار مقعد واحد على الأقل من المخطط</div>
      <div class="row" style="margin-top:10px;">
        <button class="btn block" onclick="submitBooking('${t.id}')">تأكيد الحجز</button>

function calcDiscountAmount(rawAmount){
  if(!appliedDiscount) return 0;
  const v = appliedDiscount.value||0;
  return appliedDiscount.type==='percent' ? Math.round(rawAmount * v / 100) : Math.min(v, rawAmount);
}

function applyDiscountCode(){
  const codeInput = document.getElementById('bkDiscountCode');
  const msgEl = document.getElementById('discountMsg');
  const code = (codeInput.value||'').trim().toUpperCase();
  appliedDiscount = null;
  if(!code){
    if(msgEl){ msgEl.textContent = ''; }
    refreshSeatMapUI();
    return;
  }
  const dc = discountCodesCache.find(d => (d.code||'').toUpperCase() === code);
  if(!dc || !dc.active){
    if(msgEl){ msgEl.textContent = 'كود الخصم غير صحيح أو غير مفعّل'; msgEl.style.color = 'var(--danger)'; }
    refreshSeatMapUI();
    return;
  }
  if(dc.usageLimit != null && (dc.usedCount||0) >= dc.usageLimit){
    if(msgEl){ msgEl.textContent = 'انتهى عدد مرات استخدام هذا الكود'; msgEl.style.color = 'var(--danger)'; }
    refreshSeatMapUI();
    return;
  }
  if(dc.tripId && dc.tripId !== currentBookingTripId){
    if(msgEl){ msgEl.textContent = 'الكود ده خاص برحلة تانية ومش شغال على الرحلة دي'; msgEl.style.color = 'var(--danger)'; }
    refreshSeatMapUI();
    return;
  }
  appliedDiscount = dc;
  if(msgEl){
    msgEl.textContent = `✅ تم تطبيق الكود: خصم ${dc.type==='percent' ? dc.value+'%' : dc.value+' جنيه'}`;
    msgEl.style.color = 'var(--success)';
  }
  refreshSeatMapUI();
}

async function submitBooking(tripId){
  const name = document.getElementById('bkName').value.trim();
  const phone = document.getElementById('bkPhone').value.trim();
  if(!name || !phone){ toast('من فضلك املأ الاسم والموبايل', 'error'); return; }
  if(!PHONE_RE.test(phone)){ toast('رقم الموبايل غير صحيح (لازم يبدأ بـ 01 و11 رقم)', 'error'); return; }
  if(selectedSeatNumbers.length < 1){ toast('اختار مقعد واحد على الأقل من المخطط', 'error'); return; }
  const seatNumbers = [...selectedSeatNumbers].sort((a,b)=>a-b);

  const submitBtn = document.querySelector('#app .btn.block');
  if(submitBtn) submitBtn.disabled = true;

  const tripRef = db.collection('trips').doc(tripId);
  const bookingRef = db.collection('bookings').doc();
  try{
    await db.runTransaction(async (tx)=>{
      const tripDoc = await tx.get(tripRef);
      if(!tripDoc.exists) throw new Error('trip-not-found');
      const data = tripDoc.data();
      if(data.status !== 'approved') throw new Error('trip-not-available');
      const takenSeats = data.bookedSeats || [];
      if(seatNumbers.some(n=>takenSeats.includes(n))) throw new Error('seat-taken');
      const seatsBooked = data.seatsBooked || 0;

      const rawAmount = (data.price||0) * seatNumbers.length;
      let discountAmount = 0;
      let discountCodeUsed = null;
      let discountDocRef = null;
      if(appliedDiscount){
        discountDocRef = db.collection('discountCodes').doc(appliedDiscount.id);
        const discDoc = await tx.get(discountDocRef);
        if(discDoc.exists){
          const dd = discDoc.data();
          const tripOk = !dd.tripId || dd.tripId === tripId;
          if(dd.active && tripOk && (dd.usageLimit==null || (dd.usedCount||0) < dd.usageLimit)){
            discountAmount = dd.type==='percent' ? Math.round(rawAmount*(dd.value||0)/100) : Math.min(dd.value||0, rawAmount);
            discountCodeUsed = dd.code;
          } else {
            discountDocRef = null;
          }
        } else {
          discountDocRef = null;
        }
      }
      const amount = Math.max(rawAmount - discountAmount, 0);
      const referrerUid = (refParam && refParam !== currentUser.uid) ? refParam : (data.proposedBy || null);

      let commissionAmount = 0;
      let referrerName = null;
      let commissionRateUsed = null;
      if(referrerUid){
        const referrerDoc = await tx.get(db.collection('users').doc(referrerUid));
        const referrerData = referrerDoc.exists ? referrerDoc.data() : null;
        referrerName = referrerData ? referrerData.name : (referrerUid===data.proposedBy ? data.proposedByName : null);
        const personalRate = referrerData && referrerData.commissionRate != null ? referrerData.commissionRate : null;
        if(personalRate != null){
          commissionAmount = Math.round(amount * personalRate / 100);
          commissionRateUsed = personalRate;
        } else if(data.commissionType==='percent'){
          commissionAmount = Math.round(amount * (data.commissionValue||0) / 100);
          commissionRateUsed = data.commissionValue||0;
        } else if(data.commissionType==='fixed'){
          commissionAmount = (data.commissionValue||0) * seatNumbers.length;
        }
      }

      tx.update(tripRef, {
        seatsBooked: seatsBooked + seatNumbers.length,
        bookedSeats: [...takenSeats, ...seatNumbers]
      });
      if(discountDocRef && discountAmount>0){
        tx.update(discountDocRef, {usedCount: firebase.firestore.FieldValue.increment(1)});
      }
      tx.set(bookingRef, {
        tripId, tripDestination: data.destination,
        participantUid: currentUser.uid, participantName: name, participantPhone: phone,
        participantGovernorate: currentUserData.governorate||'', participantCity: currentUserData.city||'',
        participantAddress: currentUserData.address||'',
        seats: seatNumbers.length, seatNumbers,
        originalAmount: rawAmount, discountId: discountDocRef ? discountDocRef.id : null,
        discountCode: discountCodeUsed, discountAmount, amount,
        paymentStatus:'unpaid', amountPaid:0,
        referrerUid: referrerUid || null, referrerName, commissionAmount, commissionRateUsed, commissionPaid:false,
        cancelled:false, createdAt: Date.now()
      });
    });
    toast('تم تسجيل حجزك بنجاح ✅', 'success');
    db.collection('waitlist').doc(`${tripId}_${currentUser.uid}`).delete().catch(()=>{});
    refParam = null; selectedSeatNumbers = []; currentBookingTripId = null; appliedDiscount = null;
    currentTab='trips'; renderTrips();
  }catch(e){
    if(e.message==='seat-taken'){
      toast('للأسف حد سبقك على مقعد من اللي اخترتهم، اختار مقاعد تانية', 'error');
      selectedSeatNumbers = [];
      refreshSeatMapUI();
    }
    else if(e.message==='trip-not-available') toast('الرحلة دي مبقتش متاحة', 'error');
    else toast('حدث خطأ أثناء الحجز', 'error');
    if(submitBtn) submitBtn.disabled = false;
  }
}

async function importContacts(){
  try{
    const props = ['name','tel'];
    const opts = {multiple:true};
    const picked = await navigator.contacts.select(props, opts);
    if(!picked || picked.length===0) return;
    let added = 0;
    for(const c of picked){
      const name = (c.name && c.name[0]) || 'بدون اسم';
      const rawPhone = (c.tel && c.tel[0]) || '';
      const phone = rawPhone.replace(/\D/g,'').replace(/^20/,'0');
      if(!phone) continue;
      await db.collection('contacts').add({ ownerUid: currentUser.uid, name, phone, deletedByOwner:false, createdAt: Date.now() });
      added++;
    }
    toast(added>0 ? `تم استيراد ${added} من جهات الاتصال` : 'محصلش استيراد', added>0?'success':'error');
  }catch(e){
    // المستخدم لغى الاختيار أو المتصفح رفض - مفيش داعي لإزعاجه برسالة خطأ
  }
}

async function addContactManual(){
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  if(!name){ toast('من فضلك اكتب اسم جهة الاتصال', 'error'); return; }
  if(!PHONE_RE.test(phone)){ toast('رقم الموبايل غير صحيح', 'error'); return; }
  try{
    await db.collection('contacts').add({ ownerUid: currentUser.uid, name, phone, deletedByOwner:false, createdAt: Date.now() });
    document.getElementById('cName').value=''; document.getElementById('cPhone').value='';
    toast('تمت الإضافة', 'success');
  }catch(e){ toast('حدث خطأ أثناء الإضافة', 'error'); }
}

async function deleteContact(contactId){
  if(!confirm('حذف جهة الاتصال دي من قائمتك؟')) return;
  try{ await db.collection('contacts').doc(contactId).update({deletedByOwner:true}); }
  catch(e){ toast('تعذر الحذف', 'error'); }
}

function sendContactWhatsApp(contactId, tripId){
  const c = contactsCache.find(x=>x.id===contactId);
  if(!c) return;
  let message;
  if(tripId){
    const t = tripsCache.find(x=>x.id===tripId);
    const shareUrl = `${window.location.origin}${window.location.pathname}?ref=${currentUser.uid}&trip=${tripId}`;
    message = t ? `اهلاً ${c.name}! شوف رحلة ${t.destination} دي، احجز من هنا: ${shareUrl}` : shareUrl;
  } else {
    const shareUrl = `${window.location.origin}${window.location.pathname}?ref=${currentUser.uid}`;
    message = `اهلاً ${c.name}! شوف الرحلات المتاحة عندنا: ${shareUrl}`;
  }
  window.open(buildWhatsAppLink(c.phone, message), '_blank');
}

async function cancelMyBooking(bookingId){
  if(!confirm('متأكد من إلغاء الحجز؟')) return;
  const bookingRef = db.collection('bookings').doc(bookingId);
  try{
    await db.runTransaction(async (tx)=>{
      const bDoc = await tx.get(bookingRef);
      if(!bDoc.exists) throw new Error('not-found');
      const b = bDoc.data();
      if(b.participantUid !== currentUser.uid) throw new Error('not-owner');
      if(b.cancelled) throw new Error('already-cancelled');
      if(b.paymentStatus !== 'unpaid') throw new Error('already-paid');
      const tripRef = db.collection('trips').doc(b.tripId);
      const tDoc = await tx.get(tripRef);
      if(tDoc.exists){
        const tData = tDoc.data();
        const mySeats = b.seatNumbers || [];
        const newBookedSeats = (tData.bookedSeats||[]).filter(n=>!mySeats.includes(n));
        tx.update(tripRef, {
          seatsBooked: Math.max((tData.seatsBooked||0) - b.seats, 0),
          bookedSeats: newBookedSeats
        });
      }
      tx.update(bookingRef, {cancelled:true});
    });
    toast('تم إلغاء الحجز', 'success');
  }catch(e){
    toast('تعذر إلغاء الحجز (ممكن يكون اتدفع بالفعل)', 'error');
  }
}

async function adminCancelBooking(bookingId){
  const b = bookingsCache.find(x=>x.id===bookingId);
  if(!b) return;
  if(b.cancelled){ toast('الحجز ده ملغي بالفعل', 'error'); return; }
  if(!confirm(`متأكد من إلغاء حجز ${b.participantName}؟ المقاعد هترجع متاحة للحجز تاني.`)) return;
  const bookingRef = db.collection('bookings').doc(bookingId);
  try{
    await db.runTransaction(async (tx)=>{
      const bDoc = await tx.get(bookingRef);
      if(!bDoc.exists) throw new Error('not-found');
      const bd = bDoc.data();
      if(bd.cancelled) throw new Error('already-cancelled');
      const tripRef = db.collection('trips').doc(bd.tripId);
      const tDoc = await tx.get(tripRef);
      if(tDoc.exists){
        const tData = tDoc.data();
        const bookedSeatsOfThis = bd.seatNumbers || [];
        const newBookedSeats = (tData.bookedSeats||[]).filter(n=>!bookedSeatsOfThis.includes(n));
        tx.update(tripRef, {
          seatsBooked: Math.max((tData.seatsBooked||0) - bd.seats, 0),
          bookedSeats: newBookedSeats
        });
      }
      tx.update(bookingRef, {cancelled:true});
    });
    toast('تم إلغاء الحجز', 'success');
  }catch(e){
    toast('تعذر إلغاء الحجز', 'error');
  }
}

function setAdminSubTab(tab){

  else renderAdmin();

async function loadAllUsersForAdmin(){
  renderAdmin();
  try{
    const snap = await db.collection('users').get();
    allUsersCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
  }catch(e){ toast('تعذر تحميل المستخدمين', 'error'); }
  if(adminSubTab==='referrers') renderAdmin();
}

async function loadAllContactsForAdmin(){
  renderAdmin();
  try{
    const needUsers = allUsersCache.length === 0;
    const [usersSnap, contactsSnap] = await Promise.all([
      needUsers ? db.collection('users').get() : Promise.resolve(null),
      db.collection('contacts').get()
    ]);
    if(usersSnap) allUsersCache = usersSnap.docs.map(d=>({id:d.id, ...d.data()}));
    allContactsCache = contactsSnap.docs.map(d=>({id:d.id, ...d.data()}));
  }catch(e){ toast('تعذر تحميل جهات الاتصال', 'error'); }
  if(adminSubTab==='usercontacts') renderAdmin();
}

async function exportContactsReport(){
  try{
    if(allContactsCache.length===0 || allUsersCache.length===0){
      const needUsers = allUsersCache.length === 0;
      const [usersSnap, contactsSnap] = await Promise.all([
        needUsers ? db.collection('users').get() : Promise.resolve(null),
        db.collection('contacts').get()
      ]);
      if(usersSnap) allUsersCache = usersSnap.docs.map(d=>({id:d.id, ...d.data()}));
      allContactsCache = contactsSnap.docs.map(d=>({id:d.id, ...d.data()}));
    }
    if(allContactsCache.length===0){ toast('لا توجد جهات اتصال مضافة بعد', 'error'); return; }
    const userMap = {};
    allUsersCache.forEach(u=>{ userMap[u.id] = u; });
    const rows = allContactsCache.map(c=>{
      const owner = userMap[c.ownerUid];
      return {
        'اسم جهة الاتصال': c.name||'',
        'رقم الموبايل': c.phone||'',
        'أضافها': owner ? (owner.name||'') : 'مستخدم محذوف',
        'إيميل المضيف': owner ? (owner.email||'') : '',
        'الحالة': c.deletedByOwner ? 'محذوفة من المستخدم' : 'نشطة',
        'تاريخ الإضافة': c.createdAt ? new Date(c.createdAt).toLocaleDateString('ar-EG') : ''
      };
    });
    downloadExcel(rows, 'جهات الاتصال', 'تقرير_جهات_الاتصال.xlsx');
  }catch(e){ toast('تعذر تجهيز تقرير جهات الاتصال', 'error'); }
}

async function saveReferrerRate(uid){
  const input = document.getElementById(`rate_${uid}`);
  const val = input.value.trim();
  const rate = val==='' ? null : parseFloat(val);
  if(rate!==null && (isNaN(rate) || rate<0 || rate>100)){ toast('نسبة غير صحيحة (0 لـ 100)', 'error'); return; }
  try{
    await db.collection('users').doc(uid).update({commissionRate: rate});
    const u = allUsersCache.find(x=>x.id===uid);
    if(u) u.commissionRate = rate;
    toast('تم حفظ النسبة', 'success');
  }catch(e){ toast('حدث خطأ أثناء الحفظ', 'error'); }
}

let chartMonthlyInstance = null;
let chartDestInstance = null;

function renderAdminCharts(activeBookings, trips){
  const monthlyCanvas = document.getElementById('chartMonthly');
  const destCanvas = document.getElementById('chartDestinations');
  if(!monthlyCanvas || !destCanvas || typeof Chart === 'undefined') return;

  // الإيراد الشهري لآخر 6 شهور
  const now = new Date();
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({key:`${d.getFullYear()}-${d.getMonth()}`, label: d.toLocaleDateString('ar-EG',{month:'short', year:'2-digit'}), total:0});
  }
  activeBookings.forEach(b=>{
    const d = new Date(b.createdAt||0);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    const m = months.find(x=>x.key===key);
    if(m) m.total += (b.amountPaid||0);
  });

  // أكتر 5 وجهات حجزًا
  const destCounts = {};
  activeBookings.forEach(b=>{
    destCounts[b.tripDestination] = (destCounts[b.tripDestination]||0) + b.seats;
  });
  const topDest = Object.entries(destCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  if(chartMonthlyInstance) chartMonthlyInstance.destroy();
  chartMonthlyInstance = new Chart(monthlyCanvas, {
    type:'bar',
    data:{ labels: months.map(m=>m.label), datasets:[{ label:'الإيراد (جنيه)', data: months.map(m=>m.total), backgroundColor:'#0D6E63' }] },
    options:{ responsive:true, plugins:{legend:{display:false}} }
  });

  if(chartDestInstance) chartDestInstance.destroy();
  chartDestInstance = new Chart(destCanvas, {
    type:'bar',
    data:{ labels: topDest.map(d=>d[0]), datasets:[{ label:'عدد المقاعد المحجوزة', data: topDest.map(d=>d[1]), backgroundColor:'#DD8A3E' }] },
    options:{ responsive:true, indexAxis:'y', plugins:{legend:{display:false}} }
  });
}

async function handleLogoSelect(input){
  const file = input.files[0];
  if(!file) return;
  input.disabled = true;
  const url = await uploadImageFile(file, 'site', 'setLogoStatus', 'setLogoPreview');
  input.disabled = false;
  if(url) pendingLogoUrl = url;
}

async function saveSiteSettings(){
  const logoUrl = pendingLogoUrl !== null ? pendingLogoUrl : (siteSettings.logoUrl || '');
  const siteName = document.getElementById('setSiteName').value.trim() || 'نظام الرحلات';
  const heroTitle = document.getElementById('setHeroTitle').value.trim();
  const heroSubtitle = document.getElementById('setHeroSub').value.trim();
  const bookingMessageTemplate = document.getElementById('setBookingMsg').value.trim();
  try{
    await db.collection('settings').doc('site').set({logoUrl, siteName, heroTitle, heroSubtitle, bookingMessageTemplate}, {merge:true});
    pendingLogoUrl = null;
    toast('تم حفظ إعدادات الصفحة الرئيسية', 'success');
  }catch(e){ toast('حدث خطأ أثناء الحفظ (تأكد إنك أدمن)', 'error'); }
}

// ---------------- الأدمن: المحافظات والمدن ----------------
async function addCity(){
  const gov = document.getElementById('newCityGov').value;
  const name = document.getElementById('newCityName').value.trim();
  if(!gov || !name){ toast('من فضلك اختار المحافظة واكتب اسم المدينة', 'error'); return; }
  const exists = citiesCache.some(c=>c.governorate===gov && c.name.trim()===name);
  if(exists){ toast('المدينة دي متضافة قبل كده لنفس المحافظة', 'error'); return; }
  try{
    await db.collection('cities').doc(cityDocId(gov, name)).set({governorate: gov, name, createdAt: Date.now()});
    toast('تم إضافة المدينة', 'success');
  }catch(e){ toast('حدث خطأ أثناء الإضافة', 'error'); }
}

async function deleteCity(cityId){
  if(!confirm('متأكد من حذف المدينة دي؟')) return;
  try{
    await db.collection('cities').doc(cityId).delete();
    toast('تم حذف المدينة', 'success');
  }catch(e){ toast('تعذر حذف المدينة', 'error'); }
}

// ---------------- الأدمن: أكواد الخصم ----------------
async function addDiscountCode(){
  const code = document.getElementById('newDiscCode').value.trim().toUpperCase();
  const type = document.getElementById('newDiscType').value;
  const value = parseFloat(document.getElementById('newDiscValue').value);
  const limitRaw = document.getElementById('newDiscLimit').value.trim();
  const usageLimit = limitRaw==='' ? null : parseInt(limitRaw);
  const tripId = document.getElementById('newDiscTrip').value || null;
  if(!code){ toast('من فضلك اكتب الكود', 'error'); return; }
  if(isNaN(value) || value<0){ toast('من فضلك حدد قيمة خصم صحيحة', 'error'); return; }
  if(type==='percent' && value>100){ toast('النسبة لا يمكن أن تتجاوز 100%', 'error'); return; }
  const exists = discountCodesCache.some(d=>(d.code||'').toUpperCase()===code);
  if(exists){ toast('الكود ده متضاف قبل كده', 'error'); return; }
  try{
    await db.collection('discountCodes').add({
      code, type, value, usageLimit, tripId, usedCount:0, active:true, createdAt: Date.now()
    });
    toast('تم إضافة كود الخصم', 'success');
  }catch(e){ toast('حدث خطأ أثناء الإضافة', 'error'); }
}

async function toggleDiscountActive(id){
  const d = discountCodesCache.find(x=>x.id===id);
  if(!d) return;
  try{
    await db.collection('discountCodes').doc(id).update({active: !d.active});
  }catch(e){ toast('تعذر تحديث حالة الكود', 'error'); }
}

async function deleteDiscountCode(id){
  if(!confirm('متأكد من حذف كود الخصم ده؟')) return;
  try{
    await db.collection('discountCodes').doc(id).delete();
    toast('تم حذف الكود', 'success');
  }catch(e){ toast('تعذر حذف الكود', 'error'); }
}

function exportDiscountTemplate(){

      [DISC_COL_CODE]: 'SUMMER25',
      [DISC_COL_TYPE]: 'نسبة',

      [DISC_COL_LIMIT]: '',

    const ws1 = XLSX.utils.json_to_sheet(sample);
    XLSX.utils.book_append_sheet(wb, ws1, 'أكواد الخصم');
    const tripsRows = tripsCache.length
      ? tripsCache.map(t=>({ 'اسم الرحلة (انسخه زي ما هو في عمود "مرتبط برحلة")': tripLabel(t) }))
      : [{ 'اسم الرحلة (انسخه زي ما هو في عمود "مرتبط برحلة")': 'لا توجد رحلات بعد' }];
    const ws2 = XLSX.utils.json_to_sheet(tripsRows);

    XLSX.writeFile(wb, 'قالب_اكواد_الخصم.xlsx');
  }catch(e){ toast('تعذر إنشاء ملف القالب', 'error'); }
}

function handleDiscountImportFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      await importDiscountRows(rows);
    }catch(err){
      toast('تعذر قراءة الملف، تأكد إنه بنفس شكل القالب اللي اتنزّل', 'error');
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

async function importDiscountRows(rows){
  if(!rows.length){ toast('الملف فاضي، مفيش أكواد تتضاف', 'error'); return; }
  const existingCodes = new Set(discountCodesCache.map(d=>(d.code||'').toUpperCase()));
  const tripLabelMap = {};
  tripsCache.forEach(t=>{ tripLabelMap[tripLabel(t)] = t.id; });

  const seenInFile = new Set();
  const toAdd = [];
  let skipped = 0;

  rows.forEach(row=>{
    const code = String(row[DISC_COL_CODE]||'').trim().toUpperCase();
    if(!code) return;
    if(existingCodes.has(code) || seenInFile.has(code)){ skipped++; return; }
    const typeRaw = String(row[DISC_COL_TYPE]||'').trim();
    const type = typeRaw==='ثابت' ? 'fixed' : 'percent';
    const value = parseFloat(row[DISC_COL_VALUE]);
    if(isNaN(value) || value<0 || (type==='percent' && value>100)){ skipped++; return; }
    const limitRaw = row[DISC_COL_LIMIT];
    const usageLimit = (limitRaw===''||limitRaw==null) ? null : parseInt(limitRaw);
    if(usageLimit!=null && isNaN(usageLimit)){ skipped++; return; }
    const tripLbl = String(row[DISC_COL_TRIP]||'').trim();
    let tripId = null;
    if(tripLbl){
      tripId = tripLabelMap[tripLbl];
      if(!tripId){ skipped++; return; } // الاسم متطابقش مع رحلة موجودة
    }
    seenInFile.add(code);
    toAdd.push({code, type, value, usageLimit, tripId});
  });

  if(toAdd.length===0){
    toast(`مفيش أكواد صالحة للإضافة${skipped ? ` (${skipped} صف اتجاهل)` : ''}`, 'error');
    return;
  }

  try{
    for(let i=0; i<toAdd.length; i+=450){
      const chunk = toAdd.slice(i, i+450);
      const batch = db.batch();
      chunk.forEach(item=>{
        const docRef = db.collection('discountCodes').doc();
        batch.set(docRef, {
          code: item.code, type: item.type, value: item.value,
          usageLimit: item.usageLimit, tripId: item.tripId,
          usedCount:0, active:true, createdAt: Date.now()
        });
      });
      await batch.commit();
    }
    toast(`تم إضافة ${toAdd.length} كود${skipped ? ` (اتجاهل ${skipped} صف غير صالح أو مكرر)` : ''}`, 'success');
  }catch(e){ toast('حدث خطأ أثناء استيراد الأكواد', 'error'); }
}

async function saveEditTrip(tripId){
  const t = tripsCache.find(x=>x.id===tripId);
  if(!t) return;
  const destination = document.getElementById('eDest').value.trim();
  const governorate = document.getElementById('eGovernorate').value;
  const citySel = document.getElementById('eCity');
  let city = citySel.value;
  const date = document.getElementById('eDate').value;
  const price = parseFloat(document.getElementById('ePrice').value);
  const busType = document.getElementById('eBusType').value;
  const seatsTotal = parseInt(busType);
  const meetingPoint = document.getElementById('eMeetPoint').value.trim();
  const meetingTime = document.getElementById('eMeetTime').value;
  const departureTime = document.getElementById('eDepTime').value;
  const locationUrl = document.getElementById('eLocation').value.trim();
  const notes = document.getElementById('eNotes').value.trim();
  const imageUrl = pendingTripImageUrl || t.imageUrl || '';

  if(!destination || !date || isNaN(price) || price < 0 || !seatsTotal){
    toast('من فضلك املأ كل الحقول المطلوبة بقيم صحيحة', 'error'); return;
  }
  if(!governorate || !city){
    toast('من فضلك حدد محافظة ومدينة الرحلة', 'error'); return;
  }
  if(city === '__new__'){
    const newCity = document.getElementById('eNewCity').value.trim();
    if(!newCity){ toast('من فضلك اكتب اسم المدينة الجديدة', 'error'); return; }
    city = newCity;
  }
  const maxBookedSeat = (t.bookedSeats && t.bookedSeats.length) ? Math.max(...t.bookedSeats) : 0;
  if(seatsTotal < maxBookedSeat){
    toast(`مينفعش تقلل حجم الباص كده — فيه حجز على مقعد رقم ${maxBookedSeat}. لازم تلغي الحجوزات المتأثرة الأول أو تختار باص أكبر.`, 'error');
    return;
  }
  try{
    await ensureCityExists(governorate, city);
    await db.collection('trips').doc(tripId).update({
      destination, governorate, city, date, price, seatsTotal, busType, meetingPoint, meetingTime, departureTime,
      locationUrl, notes, imageUrl
    });
    toast('تم حفظ التعديلات', 'success');
    pendingTripImageUrl = '';
    renderAdmin();
  }catch(e){ toast('حدث خطأ أثناء الحفظ', 'error'); }
}

async function markPayment(bookingId){
  const b = bookingsCache.find(x=>x.id===bookingId);
  const wasUnpaid = b.paymentStatus === 'unpaid' || !b.paymentStatus;
  const amount = prompt(`المبلغ المدفوع من إجمالي ${b.amount} جنيه:`, b.amountPaid||0);
  if(amount===null) return;
  let paid = parseFloat(amount);
  if(isNaN(paid) || paid < 0){ toast('قيمة غير صحيحة', 'error'); return; }
  const status = paid>=b.amount ? 'paid' : paid>0 ? 'partial' : 'unpaid';
  await db.collection('bookings').doc(bookingId).update({amountPaid:paid, paymentStatus:status});
  toast('تم تحديث حالة الدفع', 'success');
  // أول ما الدفع يتأكد لأول مرة، ابعت التذكرة (رابط + QR) للعميل على واتساب تلقائيًا
  if(wasUnpaid && status !== 'unpaid'){
    sendTicketWhatsApp(bookingId);
  }
}

function starRateMarkup(tripId, current){
  let html = `<div class="star-rate" id="starRate_${tripId}">`;

    html += `<span data-v="${i}" class="${i<=current?'filled':''}" onclick="setTripRatingValue('${tripId}',${i})">★</span>`;

  const commentEl = document.getElementById(`ratingComment_${tripId}`);

function tripAvgRating(tripId){
  const rs = ratingsCache.filter(r=>r.tripId===tripId);
  if(rs.length===0) return null;
  const avg = rs.reduce((s,r)=>s+r.rating,0) / rs.length;
  return {avg: Math.round(avg*10)/10, count: rs.length};
}



// ---------------- رسالة تأكيد الحجز عبر واتساب ----------------
function buildWhatsAppLink(phone, message){
  let clean = (phone||'').replace(/\D/g,'');
  if(clean.startsWith('0')) clean = '20' + clean.slice(1);
  else if(!clean.startsWith('20')) clean = '20' + clean;
  return `https://wa.me/${clean}?text=${encodeURIComponent(message)}`;
}

function sendBookingMessage(bookingId){
  const b = bookingsCache.find(x=>x.id===bookingId);
  if(!b) return;
  let msg = siteSettings.bookingMessageTemplate || '';
  msg = msg
    .replaceAll('{الاسم}', b.participantName||'')
    .replaceAll('{الرحلة}', b.tripDestination||'')
    .replaceAll('{المقاعد}', b.seats||'')
    .replaceAll('{المبلغ}', b.amount||'');
  window.open(buildWhatsAppLink(b.participantPhone, msg), '_blank');
}

// ---------------- تصدير تقارير Excel ----------------
function downloadExcel(rows, sheetName, filename){
  if(!rows.length){ toast('لا توجد بيانات كافية لعمل التقرير', 'error'); return; }
  try{
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename);
  }catch(e){ toast('تعذر إنشاء ملف الإكسل', 'error'); }
}

function exportBookingsReport(){
  const rows = [];
  tripsCache.forEach(t=>{
    const tripBookings = bookingsCache.filter(b=>b.tripId===t.id);
    const statusAr = t.status==='approved'?'معتمدة':t.status==='rejected'?'مرفوضة':'قيد المراجعة';
    if(tripBookings.length===0){
      rows.push({
        'الوجهة': t.destination, 'التاريخ': t.date, 'سعر الفرد': t.price,
        'نوع الباص': t.busType||t.seatsTotal, 'نقطة التجمع': t.meetingPoint||'',
        'ساعة التجمع': t.meetingTime||'', 'ساعة التحرك': t.departureTime||'',
        'إجمالي المقاعد': t.seatsTotal, 'حالة الرحلة': statusAr,
        'اسم الحاجز':'', 'موبايل الحاجز':'', 'المحافظة':'', 'المدينة':'', 'عدد المقاعد المحجوزة':'', 'أرقام المقاعد':'',
        'السعر قبل الخصم':'', 'كود الخصم':'', 'قيمة الخصم':'', 'المبلغ المطلوب':'', 'المدفوع':'', 'حالة الدفع':'', 'ملغي؟':''
      });
    } else {
      tripBookings.forEach(b=>{
        rows.push({
          'الوجهة': t.destination, 'التاريخ': t.date, 'سعر الفرد': t.price,
          'نوع الباص': t.busType||t.seatsTotal, 'نقطة التجمع': t.meetingPoint||'',
          'ساعة التجمع': t.meetingTime||'', 'ساعة التحرك': t.departureTime||'',
          'إجمالي المقاعد': t.seatsTotal, 'حالة الرحلة': statusAr,
          'اسم الحاجز': b.participantName, 'موبايل الحاجز': b.participantPhone,
          'المحافظة': b.participantGovernorate||'', 'المدينة': b.participantCity||'',
          'عدد المقاعد المحجوزة': b.seats, 'أرقام المقاعد': (b.seatNumbers||[]).join('، '),
          'السعر قبل الخصم': b.originalAmount!=null ? b.originalAmount : b.amount,
          'كود الخصم': b.discountCode||'', 'قيمة الخصم': b.discountAmount||0,
          'المبلغ المطلوب': b.amount, 'المدفوع': b.amountPaid||0,
          'حالة الدفع': b.paymentStatus==='paid'?'مدفوع':b.paymentStatus==='partial'?'جزئي':'غير مدفوع',
          'ملغي؟': b.cancelled?'نعم':'لا'
        });
      });
    }
  });
  downloadExcel(rows, 'الرحلات والحجوزات', 'تقرير_الرحلات_والحجوزات.xlsx');
}

async function exportUsersReport(){
  try{
    const [usersSnap, reqSnap] = await Promise.all([
      db.collection('users').get(),
      db.collection('organizerRequests').get()
    ]);
    const reqByUid = {};
    reqSnap.docs.forEach(d=>{ reqByUid[d.id] = d.data(); });
    const rows = usersSnap.docs.map(d=>{
      const u = d.data();
      const roleAr = u.role==='admin' ? 'أدمن' : u.role==='organizer' ? 'مشرف رحلات' : 'مستخدم';
      const req = reqByUid[d.id];
      const reqStatusAr = req ? (req.status==='approved'?'مقبول':req.status==='rejected'?'مرفوض':'قيد المراجعة') : '';
      return {
        'الاسم': u.name||'',
        'البريد الإلكتروني': u.email||'',
        'الدور': roleAr,
        'رقم الموبايل': u.phone||'',
        'رقم موبايل احتياطي': u.phone2||'',
        'المحافظة': u.governorate||'',
        'المدينة': u.city||'',
        'العنوان': u.address||'',
        'الرقم القومي (طلب الإشراف)': req ? (req.nationalId||'') : '',
        'حالة طلب الإشراف': reqStatusAr,
        'تاريخ التسجيل': u.createdAt ? new Date(u.createdAt).toLocaleDateString('ar-EG') : ''
      };
    });
    downloadExcel(rows, 'المشتركين', 'تقرير_المشتركين.xlsx');
  }catch(e){ toast('تعذر تجهيز تقرير المشتركين', 'error'); }
}
