<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الرحلات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --ink:#1E2A2A; --muted:#75817C; --bg:#F5F1E6; --surface:#FFFFFF; --border:#E6DFCC;
    --primary:#0D6E63; --primary-dark:#083F38; --primary-light:#E1EFEC;
    --accent:#DD8A3E; --accent-dark:#A9611F; --accent-light:#FBEEDD;
    --danger:#BE4438; --danger-light:#F7E2DE;
    --success:#2E8858; --success-light:#DEEFE4;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--ink);
    margin:0; padding-bottom:74px; min-height:100vh;
  }
  h1,h2,h3,.trip-title,.btn,label,.tab{font-family:'Cairo',sans-serif;}
  h3{ font-weight:800; color:var(--ink); position:relative; padding-bottom:12px; margin:0 0 4px;}
  h3::after{
    content:""; display:block; position:absolute; right:0; bottom:2px;
    width:44px; height:0; border-top:3px dashed var(--accent);
  }
  header{
    background:linear-gradient(120deg,var(--primary-dark),var(--primary));
    color:#fff; padding:16px 18px; position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 2px 10px rgba(8,63,56,.25);
  }
  header h1{font-size:18px; margin:0; font-weight:800; display:flex; align-items:center;}
  header .user-badge{font-size:12px; opacity:.92;}
  .container{max-width:640px; margin:0 auto; padding:16px;}
  .card{
    background:var(--surface); border-radius:16px; padding:16px; margin-bottom:14px;
    box-shadow:0 2px 10px rgba(30,42,42,.06); border:1px solid var(--border);
  }
  .btn{
    display:inline-block; background:var(--primary); color:#fff; border:none;
    padding:12px 18px; border-radius:12px; font-family:inherit; font-weight:700;
    font-size:14px; cursor:pointer; text-align:center; transition:.15s;
  }
  .btn:hover{background:var(--primary-dark);}
  .btn.secondary{background:#fff; color:var(--primary); border:1.5px solid var(--primary);}
  .btn.danger{background:var(--danger);}
  .btn.accent{background:var(--accent); color:#fff;}
  .btn.block{width:100%;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  input, select, textarea{
    width:100%; padding:11px; border:1.5px solid var(--border); border-radius:10px;
    font-family:inherit; font-size:14px; margin-bottom:10px; background:#fff; color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--primary); outline-offset:1px; border-color:var(--primary);}
  label{font-size:13px; font-weight:700; color:var(--muted); display:block; margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .tabbar{
    position:fixed; bottom:0; right:0; left:0; background:#fff; display:flex;
    border-top:1px solid var(--border); z-index:50; box-shadow:0 -2px 10px rgba(30,42,42,.08);
  }
  .tab{
    flex:1; text-align:center; padding:10px 4px 8px; font-size:11px; color:var(--muted);
    cursor:pointer; border:none; background:none; font-weight:700;
  }
  .tab.active{color:var(--primary);}
  .tab .icon{font-size:19px; display:block; margin-bottom:2px;}
  .badge{
    display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
  }
  .badge.pending{background:var(--accent-light); color:var(--accent-dark);}
  .badge.approved{background:var(--success-light); color:var(--success);}
  .badge.rejected{background:var(--danger-light); color:var(--danger);}
  .badge.paid{background:var(--success-light); color:var(--success);}
  .badge.unpaid{background:var(--danger-light); color:var(--danger);}
  .badge.partial{background:var(--accent-light); color:var(--accent-dark);}
  .badge.muted{background:#EEEAE0; color:var(--muted);}
  .trip-title{font-size:16px; font-weight:800; margin:0 0 4px; color:var(--ink);}
  .trip-meta{font-size:13px; color:var(--muted); margin-bottom:8px; line-height:1.8;}
  .trip-meta b{color:var(--ink);}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .row > *{flex:1; min-width:120px;}
  .empty{text-align:center; color:var(--muted); padding:30px 10px; font-size:14px;}
  .toast{
    position:fixed; top:70px; right:16px; left:16px; max-width:600px; margin:0 auto;
    background:var(--ink); color:#fff; padding:12px 16px; border-radius:10px; font-size:13px;
    z-index:100; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  .toast.error{background:var(--danger);}
  .toast.success{background:var(--success);}
  .hidden{display:none !important;}
  .divider{border:none; border-top:1px dashed var(--border); margin:14px 0;}
  .link-box{
    background:var(--primary-light); border:1px dashed var(--primary); border-radius:10px; padding:10px;
    font-size:12px; word-break:break-all; color:var(--primary-dark); margin-bottom:8px;
  }
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center;}
  .stat .num{font-size:22px; font-weight:800; color:var(--primary); font-family:'Cairo',sans-serif;}
  .stat .lbl{font-size:12px; color:var(--muted); margin-top:2px;}
  .loading{text-align:center; padding:40px; color:var(--muted);}
  .auth-box{max-width:400px; margin:20px auto 0;}
  .auth-box h2{text-align:center; font-weight:800;}
  .switch-link{text-align:center; font-size:13px; color:var(--primary); cursor:pointer; margin-top:8px; font-weight:700;}
  .commission-form{background:var(--accent-light); border:1px solid #F0D5AE; border-radius:10px; padding:10px; margin-top:8px;}
  .header-logo{height:28px; width:28px; object-fit:cover; border-radius:6px; vertical-align:middle; margin-left:6px;}
  .landing-hero{text-align:center; padding:18px 6px 24px;}
  .landing-logo{height:64px; margin-bottom:10px; border-radius:12px;}
  .landing-hero h2{margin:0 0 12px; font-size:22px; font-weight:800; position:relative; display:inline-block;}
  .landing-hero h2::after{
    content:""; display:block; margin:10px auto 0; width:64px; height:0;
    border-top:3px dashed var(--accent);
  }
  .landing-hero p{color:var(--muted); font-size:14px; margin:0; line-height:1.7;}
  .trip-img{width:100%; height:160px; object-fit:cover; border-radius:12px; margin-bottom:10px; display:block; background:var(--primary-light);}
  .map-link{color:var(--primary); font-weight:700; text-decoration:none; font-size:13px;}
  .admin-subnav{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; margin-bottom:4px;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .admin-subnav::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto; padding:9px 16px; border-radius:999px; border:1.5px solid var(--border);
    background:#fff; color:var(--muted); font-family:'Cairo',sans-serif; font-weight:700; font-size:13px;
    white-space:nowrap; cursor:pointer;
  }
  .pill.active{background:var(--primary); border-color:var(--primary); color:#fff;}
</style>
</head>
<body>

<header>
  <h1 id="siteTitle">🧳 نظام الرحلات</h1>
  <div id="userBadge" class="user-badge hidden">
    <span id="userNameLbl"></span> · <a id="logoutBtn" style="color:#fff; cursor:pointer; text-decoration:underline;">خروج</a>
  </div>
</header>

<div id="toastHolder"></div>

<div class="container" id="app">
  <div class="loading">جاري التحميل...</div>
</div>

<div class="tabbar hidden" id="tabbar">
  <button class="tab" data-tab="trips"><span class="icon">🗺️</span>الرحلات</button>
  <button class="tab hidden" id="proposeTabBtn" data-tab="propose"><span class="icon">➕</span>اقترح رحلة</button>
  <button class="tab hidden" id="organizerTabBtn" data-tab="organizer"><span class="icon">🎓</span>مشرف رحلات</button>
  <button class="tab" data-tab="mine"><span class="icon">💰</span>رحلاتي وأرباحي</button>
  <button class="tab hidden" id="adminTabBtn" data-tab="admin"><span class="icon">⚙️</span>الأدمن</button>
</div>

<script>
/* =========================================================
   إعدادات Firebase — لازم تستبدل القيم دي ببيانات مشروعك
   من Firebase Console > Project Settings > Your apps
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCj9aLy41Q0K3A3XK-pTqHQCoZn3HGYU98",
  authDomain: "zzzz-ba6f8.firebaseapp.com",
  projectId: "zzzz-ba6f8",
  storageBucket: "zzzz-ba6f8.firebasestorage.app",
  messagingSenderId: "1067863371782",
  appId: "1:1067863371782:web:f8f7c72387a6282f879387",
  measurementId: "G-TQLDZC2QJ3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// إعدادات Cloudinary (لرفع الصور مجانًا بدون ترقية Firebase لباقة مدفوعة)
const CLOUDINARY_CLOUD_NAME = "hglkbvu5";
const CLOUDINARY_UPLOAD_PRESET = "hommfb4n";

// ضع هنا إيميلات الأدمن (بالإضافة إلى role:"admin" في Firestore)
const ADMIN_EMAILS = ["iemasam89@gmail.com"];

let currentUser = null;
let currentUserData = null;
let currentTab = "trips";
let tripsCache = [];
let bookingsCache = [];
let refParam = null;
let unsubTrips = null;
let unsubBookings = null;
let unsubUserDoc = null;
let unsubMyOrgRequest = null;
let unsubOrgRequests = null;
let myOrganizerRequest = null;
let organizerRequestsCache = [];
let authMode = 'login';
let adminSubTab = 'overview';
let pendingTripImageUrl = '';
let pendingLogoUrl = null; // null = مفيش تغيير، نص = رابط شعار جديد اترفع
let pendingIdFrontUrl = '';
let pendingIdBackUrl = '';
let pendingSelfieUrl = '';
const PHONE_RE = /^01[0125][0-9]{8}$/;

function uploadImageFile(file, folder, statusElId, previewElId){
  const statusEl = document.getElementById(statusElId);
  const previewEl = document.getElementById(previewElId);
  if(!file.type.startsWith('image/')){ toast('الملف لازم يكون صورة', 'error'); return Promise.resolve(null); }
  if(file.size > 5*1024*1024){ toast('حجم الصورة أكبر من 5 ميجا', 'error'); return Promise.resolve(null); }
  if(statusEl) statusEl.textContent = 'جاري رفع الصورة... 0%';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  formData.append('folder', folder);

  return new Promise((resolve)=>{
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable && statusEl){
        const pct = Math.round((e.loaded/e.total)*100);
        statusEl.textContent = `جاري رفع الصورة... ${pct}%`;
      }
    };
    xhr.onload = ()=>{
      let res = null;
      try{ res = JSON.parse(xhr.responseText); }catch(e){}
      if(xhr.status>=200 && xhr.status<300 && res && res.secure_url){
        if(statusEl) statusEl.textContent = 'تم رفع الصورة ✅';
        if(previewEl){ previewEl.src = res.secure_url; previewEl.classList.remove('hidden'); }
        resolve(res.secure_url);
      } else {
        if(statusEl) statusEl.textContent = '';
        toast('تعذر رفع الصورة، حاول تاني', 'error');
        resolve(null);
      }
    };
    xhr.onerror = ()=>{
      if(statusEl) statusEl.textContent = '';
      toast('تعذر رفع الصورة، تأكد من الاتصال بالإنترنت', 'error');
      resolve(null);
    };
    xhr.send(formData);
  });
}

let siteSettings = {
  siteName: 'نظام الرحلات',
  logoUrl: '',
  heroTitle: 'سافر معانا واكسب من كل صديق يحجز',
  heroSubtitle: 'اختار رحلتك، احجز مكانك، وشارك رابطك مع أصحابك، واكسب عمولة من كل حجز يتم من خلاله.',
  bookingMessageTemplate: 'مرحبًا {الاسم} 👋\nتم تسجيل حجزك في رحلة {الرحلة} بعدد {المقاعد} مقعد.\nالمبلغ المطلوب: {المبلغ} جنيه.\nبرجاء تحويل المبلغ تحت الحساب لتأكيد الحجز.\nشكرًا لثقتك بنا 🌹'
};

function applySiteSettings(){
  const h1 = document.getElementById('siteTitle');
  if(!h1) return;
  h1.innerHTML = siteSettings.logoUrl
    ? `<img src="${escapeHtml(siteSettings.logoUrl)}" alt="logo" class="header-logo">${escapeHtml(siteSettings.siteName)}`
    : `🧳 ${escapeHtml(siteSettings.siteName)}`;
}

db.collection('settings').doc('site').onSnapshot(doc=>{
  if(doc.exists) siteSettings = {...siteSettings, ...doc.data()};
  applySiteSettings();
  if(!currentUser) renderAuth(authMode);
}, ()=>{ applySiteSettings(); });

// ---- قراءة رابط الإحالة من العنوان ----
(function readRef(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('ref')) refParam = params.get('ref');
})();

function toast(msg, type=""){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastHolder').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

function fmtDate(d){
  try{ return new Date(d).toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'}); }
  catch(e){ return d; }
}

// ---------------- AUTH ----------------
auth.onAuthStateChanged(async (user)=>{
  currentUser = user;
  if(user){
    const userRef = db.collection('users').doc(user.uid);
    let doc = await userRef.get();
    if(!doc.exists){
      const isAdmin = ADMIN_EMAILS.includes(user.email);
      currentUserData = {
        name: user.email.split('@')[0], email: user.email,
        role: isAdmin ? 'admin' : 'user', createdAt: Date.now()
      };
      await userRef.set(currentUserData);
    } else {
      currentUserData = doc.data();
      if(ADMIN_EMAILS.includes(user.email) && currentUserData.role !== 'admin'){
        currentUserData.role = 'admin';
        await userRef.update({role:'admin'});
      }
    }
    document.getElementById('userBadge').classList.remove('hidden');
    document.getElementById('userNameLbl').textContent = currentUserData.name || user.email;
    document.getElementById('tabbar').classList.remove('hidden');
    updateTabVisibility();

    // استماع مستمر لمستند المستخدم عشان لو الأدمن وافق على طلب الإشراف يتحدث فورًا من غير logout
    if(unsubUserDoc) unsubUserDoc();
    unsubUserDoc = userRef.onSnapshot(d=>{
      if(d.exists){
        currentUserData = d.data();
        document.getElementById('userNameLbl').textContent = currentUserData.name || user.email;
        updateTabVisibility();
        renderTab();
      }
    });

    loadAllData();
  } else {
    currentUserData = null;
    if(unsubTrips){ unsubTrips(); unsubTrips = null; }
    if(unsubBookings){ unsubBookings(); unsubBookings = null; }
    if(unsubUserDoc){ unsubUserDoc(); unsubUserDoc = null; }
    if(unsubMyOrgRequest){ unsubMyOrgRequest(); unsubMyOrgRequest = null; }
    if(unsubOrgRequests){ unsubOrgRequests(); unsubOrgRequests = null; }
    tripsCache = []; bookingsCache = []; myOrganizerRequest = null; organizerRequestsCache = [];
    document.getElementById('userBadge').classList.add('hidden');
    document.getElementById('tabbar').classList.add('hidden');
    renderAuth();
  }
});

function updateTabVisibility(){
  const canPropose = currentUserData.role === 'organizer' || currentUserData.role === 'admin';
  document.getElementById('proposeTabBtn').classList.toggle('hidden', !canPropose);
  document.getElementById('organizerTabBtn').classList.toggle('hidden', canPropose);
  document.getElementById('adminTabBtn').classList.toggle('hidden', currentUserData.role !== 'admin');
}

document.getElementById('logoutBtn').onclick = ()=> auth.signOut();

function renderAuth(mode='login'){
  authMode = mode;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="landing-hero">
      ${siteSettings.logoUrl ? `<img src="${escapeHtml(siteSettings.logoUrl)}" class="landing-logo" alt="logo">` : ''}
      <h2>${escapeHtml(siteSettings.heroTitle)}</h2>
      <p>${escapeHtml(siteSettings.heroSubtitle)}</p>
    </div>
    <div id="landingTrips"></div>
    <div class="auth-box card">
      <h2>${mode==='login' ? 'تسجيل الدخول' : 'حساب جديد'}</h2>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="authEmail" placeholder="example@mail.com">
      </div>
      ${mode==='signup' ? `<div class="field"><label>الاسم</label><input type="text" id="authName" placeholder="اسمك بالكامل"></div>` : ''}
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="authPass" placeholder="6 أحرف على الأقل">
      </div>
      <button class="btn block" id="authSubmit">${mode==='login' ? 'دخول' : 'إنشاء حساب'}</button>
      <div class="switch-link" id="switchMode">
        ${mode==='login' ? 'مالكش حساب؟ سجّل دلوقتي' : 'عندك حساب؟ سجّل دخول'}
      </div>
    </div>`;

  loadLandingTrips();

  document.getElementById('switchMode').onclick = ()=> renderAuth(mode==='login' ? 'signup' : 'login');

  document.getElementById('authSubmit').onclick = async ()=>{
    const email = document.getElementById('authEmail').value.trim();
    const pass = document.getElementById('authPass').value;
    if(!email || !pass){ toast('من فضلك املأ كل الحقول', 'error'); return; }
    try{
      if(mode==='login'){
        await auth.signInWithEmailAndPassword(email, pass);
      } else {
        const name = document.getElementById('authName').value.trim() || email.split('@')[0];
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection('users').doc(cred.user.uid).set({
          name, email, role: ADMIN_EMAILS.includes(email) ? 'admin':'user', createdAt: Date.now()
        });
      }
    }catch(e){ toast(translateAuthError(e), 'error'); }
  };
}

async function loadLandingTrips(){
  const holder = document.getElementById('landingTrips');
  if(!holder) return;
  try{
    const snap = await db.collection('trips').where('status','==','approved').limit(6).get();
    if(!document.getElementById('landingTrips')) return; // المستخدم غيّر الشاشة قبل ما يوصل الرد
    let trips = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(t=>!t.hidden);
    trips.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    trips = trips.slice(0,3);
    if(trips.length===0){ holder.innerHTML = ''; return; }
    holder.innerHTML = `<h3 style="margin:4px 0 10px;">أحدث الرحلات المتاحة</h3>` + trips.map(t=>{
      const seatsLeft = Math.max((t.seatsTotal||0) - (t.seatsBooked||0), 0);
      return `
      <div class="card">
        ${t.imageUrl ? `<img src="${escapeHtml(t.imageUrl)}" class="trip-img" alt="${escapeHtml(t.destination)}">` : ''}
        <div class="trip-title">📍 ${escapeHtml(t.destination)}</div>
        <div class="trip-meta">💵 ${t.price} جنيه · 🪑 متبقي ${seatsLeft} مقعد</div>
      </div>`;
    }).join('') + `<div class="trip-meta" style="text-align:center; margin-bottom:14px;">سجّل دخولك أو اعمل حساب عشان تحجز 👇</div>`;
  }catch(e){
    holder.innerHTML = '';
  }
}

function translateAuthError(e){
  const map = {
    'auth/user-not-found':'المستخدم غير موجود',
    'auth/wrong-password':'كلمة المرور غير صحيحة',
    'auth/email-already-in-use':'البريد الإلكتروني مستخدم بالفعل',
    'auth/weak-password':'كلمة المرور ضعيفة (6 أحرف على الأقل)',
    'auth/invalid-email':'البريد الإلكتروني غير صحيح'
  };
  return map[e.code] || 'حدث خطأ، حاول مرة أخرى';
}

// ---------------- DATA LOADING ----------------
function loadAllData(){
  if(unsubTrips) unsubTrips();
  if(unsubBookings) unsubBookings();
  if(unsubMyOrgRequest) unsubMyOrgRequest();
  if(unsubOrgRequests) unsubOrgRequests();
  unsubTrips = db.collection('trips').orderBy('createdAt','desc').onSnapshot(snap=>{
    tripsCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderTab();
  }, err=> toast('تعذر تحميل الرحلات', 'error'));
  unsubBookings = db.collection('bookings').orderBy('createdAt','desc').onSnapshot(snap=>{
    bookingsCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderTab();
  }, err=> toast('تعذر تحميل الحجوزات', 'error'));
  unsubMyOrgRequest = db.collection('organizerRequests').doc(currentUser.uid).onSnapshot(doc=>{
    myOrganizerRequest = doc.exists ? doc.data() : null;
    if(currentTab==='organizer') renderTab();
  }, ()=>{ myOrganizerRequest = null; });
  if(currentUserData.role === 'admin'){

async function submitBooking(tripId){
  const name = document.getElementById('bkName').value.trim();
  const phone = document.getElementById('bkPhone').value.trim();
  const seats = parseInt(document.getElementById('bkSeats').value) || 1;
  if(!name || !phone){ toast('من فضلك املأ الاسم والموبايل', 'error'); return; }
  if(!PHONE_RE.test(phone)){ toast('رقم الموبايل غير صحيح (لازم يبدأ بـ 01 و11 رقم)', 'error'); return; }
  if(seats < 1){ toast('عدد المقاعد لازم يكون واحد على الأقل', 'error'); return; }

  const submitBtn = document.querySelector('#app .btn.block');
  if(submitBtn) submitBtn.disabled = true;

  const tripRef = db.collection('trips').doc(tripId);
  const bookingRef = db.collection('bookings').doc();
  try{
    await db.runTransaction(async (tx)=>{
      const tripDoc = await tx.get(tripRef);
      if(!tripDoc.exists) throw new Error('trip-not-found');
      const data = tripDoc.data();
      if(data.status !== 'approved') throw new Error('trip-not-available');
      const seatsBooked = data.seatsBooked || 0;
      const seatsLeft = (data.seatsTotal||0) - seatsBooked;
      if(seats > seatsLeft) throw new Error('not-enough-seats');

      const amount = (data.price||0) * seats;
      let commissionAmount = 0;
      const referrerUid = (refParam && refParam !== currentUser.uid) ? refParam : (data.proposedBy || null);
      if(referrerUid){
        if(data.commissionType==='percent') commissionAmount = Math.round(amount * (data.commissionValue||0) / 100);
        else if(data.commissionType==='fixed') commissionAmount = (data.commissionValue||0) * seats;
      }

      tx.update(tripRef, {seatsBooked: seatsBooked + seats});
      tx.set(bookingRef, {
        tripId, tripDestination: data.destination,
        participantUid: currentUser.uid, participantName: name, participantPhone: phone,
        seats, amount, paymentStatus:'unpaid', amountPaid:0,
        referrerUid: referrerUid || null, commissionAmount, commissionPaid:false,
        cancelled:false, createdAt: Date.now()
      });
    });
    toast('تم تسجيل حجزك بنجاح ✅', 'success');
    refParam = null;
    currentTab='trips'; renderTrips();
  }catch(e){
    if(e.message==='not-enough-seats') toast('للأسف المقاعد المتاحة أقل من اللي طلبتها', 'error');
    else if(e.message==='trip-not-available') toast('الرحلة دي مبقتش متاحة', 'error');
    else toast('حدث خطأ أثناء الحجز', 'error');
    if(submitBtn) submitBtn.disabled = false;
  }
}

          الحاجز: ${escapeHtml(b.participantName)} · ${b.seats} مقعد<br>

          <span class="badge ${b.commissionPaid?'paid':'unpaid'}">${b.commissionPaid?'مدفوعة':'لسه'}</span>

  html += `<h3 style="margin:18px 0 10px;">حجوزاتي</h3>`;

async function cancelMyBooking(bookingId){
  if(!confirm('متأكد من إلغاء الحجز؟')) return;
  const bookingRef = db.collection('bookings').doc(bookingId);
  try{
    await db.runTransaction(async (tx)=>{
      const bDoc = await tx.get(bookingRef);
      if(!bDoc.exists) throw new Error('not-found');
      const b = bDoc.data();
      if(b.participantUid !== currentUser.uid) throw new Error('not-owner');
      if(b.cancelled) throw new Error('already-cancelled');
      if(b.paymentStatus !== 'unpaid') throw new Error('already-paid');
      const tripRef = db.collection('trips').doc(b.tripId);
      const tDoc = await tx.get(tripRef);
      if(tDoc.exists){
        const seatsBooked = (tDoc.data().seatsBooked||0) - b.seats;
        tx.update(tripRef, {seatsBooked: Math.max(seatsBooked, 0)});
      }
      tx.update(bookingRef, {cancelled:true});
    });
    toast('تم إلغاء الحجز', 'success');
  }catch(e){
    toast('تعذر إلغاء الحجز (ممكن يكون اتدفع بالفعل)', 'error');
  }
}

            <a href="${escapeHtml(r.idFrontUrl)}" target="_blank" rel="noopener" class="map-link">📇 وش البطاقة</a>
            <a href="${escapeHtml(r.idBackUrl)}" target="_blank" rel="noopener" class="map-link">📇 ضهر البطاقة</a>
            <a href="${escapeHtml(r.selfieUrl)}" target="_blank" rel="noopener" class="map-link">🤳 السيلفي</a>
          </div>
          <div class="row">
            <button class="btn block" onclick="approveOrganizer('${r.id}')">✅ موافقة</button>
            <button class="btn danger block" onclick="rejectOrganizer('${r.id}')">❌ رفض</button>
          </div>
        </div>`).join('');
    }
  }

  else if(adminSubTab === 'pending'){
    if(pending.length===0){
      html += `<div class="empty">لا يوجد اقتراحات جديدة</div>`;
    } else {
      html += pending.map(t=>`
        <div class="card">
          ${t.imageUrl ? `<img src="${escapeHtml(t.imageUrl)}" class="trip-img" alt="${escapeHtml(t.destination)}">` : ''}
          <div class="trip-title">📍 ${escapeHtml(t.destination)}</div>
          <div class="trip-meta">
            ${fmtDate(t.date)} · ${t.price} جنيه · ${t.seatsTotal} مقعد<br>
            مقترح من: <b>${escapeHtml(t.proposedByName||'')}</b>
            ${t.locationUrl ? `<br><a href="${escapeHtml(t.locationUrl)}" target="_blank" rel="noopener" class="map-link">🗺️ الموقع على الخريطة</a>` : ''}
            ${t.notes ? `<br>ملاحظات: ${escapeHtml(t.notes)}` : ''}
          </div>
          <div class="commission-form">
            <label>نوع العمولة</label>
            <select id="ctype_${t.id}">
              <option value="percent">نسبة % من كل تذكرة</option>
              <option value="fixed">مبلغ ثابت لكل حجز</option>
            </select>
            <label>القيمة</label>
            <input id="cval_${t.id}" type="number" min="0" placeholder="مثلاً 10">
          </div>
          <div class="row" style="margin-top:10px;">
            <button class="btn block" onclick="approveTrip('${t.id}')">✅ موافقة</button>
            <button class="btn danger block" onclick="rejectTrip('${t.id}')">❌ رفض</button>
          </div>
          <div class="row" style="margin-top:8px;">
            <button class="btn secondary block" onclick="openEditTrip('${t.id}')">✏️ تعديل</button>
            <button class="btn danger block" onclick="deleteTrip('${t.id}')">🗑️ حذف</button>
          </div>
        </div>`).join('');
    }
  }

  else if(adminSubTab === 'trips'){
    if(otherTrips.length===0){
      html += `<div class="empty">لا توجد رحلات أخرى</div>`;
    } else {
      html += otherTrips.map(t=>{
        const badgeClass = t.status==='approved'?'approved':'rejected';
        const badgeText = t.status==='approved'?'معتمدة':'مرفوضة';
        const seatsLeft = Math.max((t.seatsTotal||0)-(t.seatsBooked||0),0);
        return `
        <div class="card">
          ${t.imageUrl ? `<img src="${escapeHtml(t.imageUrl)}" class="trip-img" alt="${escapeHtml(t.destination)}">` : ''}
          <div class="trip-title">📍 ${escapeHtml(t.destination)} <span class="badge ${badgeClass}">${badgeText}</span> ${t.hidden ? '<span class="badge muted">مخفية عن الزوار</span>' : ''}</div>
          <div class="trip-meta">
            ${fmtDate(t.date)} · ${t.price} جنيه · متبقي ${seatsLeft} من ${t.seatsTotal} مقعد
            ${t.status==='approved' ? `<br>العمولة: <b>${t.commissionType==='percent' ? t.commissionValue+'%' : t.commissionValue+' جنيه/حجز'}</b>` : ''}
            ${t.locationUrl ? `<br><a href="${escapeHtml(t.locationUrl)}" target="_blank" rel="noopener" class="map-link">🗺️ الموقع على الخريطة</a>` : ''}
          </div>
          <div class="row">
            <button class="btn secondary block" onclick="openEditTrip('${t.id}')">✏️ تعديل</button>
            <button class="btn danger block" onclick="deleteTrip('${t.id}')">🗑️ حذف</button>
          </div>
          ${t.status==='approved' ? `
          <div class="row" style="margin-top:8px;">
            <button class="btn ${t.hidden?'':'secondary'} block" onclick="toggleTripVisibility('${t.id}')">
              ${t.hidden ? '👁️ إظهار الرحلة للزوار' : '🙈 إخفاء الرحلة'}
            </button>
          </div>` : ''}
        </div>`;
      }).join('');
    }
  }

  else if(adminSubTab === 'bookings'){
    if(bookingsCache.length===0){
      html += `<div class="empty">لا توجد حجوزات بعد</div>`;
    } else {
      html += bookingsCache.map(b=>`
        <div class="card">
          <div class="trip-title">${escapeHtml(b.tripDestination)} ${b.cancelled ? '<span class="badge rejected">ملغي</span>' : ''}</div>
          <div class="trip-meta">
            ${escapeHtml(b.participantName)} · ${escapeHtml(b.participantPhone)} · ${b.seats} مقعد<br>
            المطلوب: <b>${b.amount} جنيه</b> · المدفوع: <b>${b.amountPaid||0} جنيه</b>
            <span class="badge ${b.paymentStatus}">${b.paymentStatus==='paid'?'مدفوع':b.paymentStatus==='partial'?'جزئي':'غير مدفوع'}</span>
            ${b.referrerUid ? `<br>عمولة المسوّق: <b>${b.commissionAmount} جنيه</b> <span class="badge ${b.commissionPaid?'paid':'unpaid'}">${b.commissionPaid?'مدفوعة':'لسه'}</span>` : ''}
          </div>
          ${!b.cancelled ? `
          <div class="row">
            <button class="btn secondary block" onclick="markPayment('${b.id}')">تحديث الدفع</button>
            ${b.referrerUid && !b.commissionPaid ? `<button class="btn accent block" onclick="markCommissionPaid('${b.id}')">دفع العمولة</button>` : ''}
          </div>
          <button class="btn block" style="margin-top:8px;" onclick="sendBookingMessage('${b.id}')">📩 ابعت رسالة تأكيد الحجز (واتساب)</button>` : ''}
        </div>`).join('');
    }
  }

  else if(adminSubTab === 'settings'){
    html += `
      <div class="card">
        <h3>🎨 إعدادات الصفحة الرئيسية</h3>
        <div class="field">
          <label>شعار الموقع (لوجو)</label>
          <input type="file" id="setLogoFile" accept="image/*" onchange="handleLogoSelect(this)">
          <div id="setLogoStatus" class="trip-meta"></div>
          <img id="setLogoPreview" src="${escapeHtml(pendingLogoUrl ?? siteSettings.logoUrl ?? '')}" style="height:56px; border-radius:10px; margin-bottom:8px; display:block;" class="${(pendingLogoUrl ?? siteSettings.logoUrl) ? '' : 'hidden'}" alt="اللوجو">
        </div>
        <div class="field"><label>اسم الموقع (يظهر جنب اللوجو)</label><input id="setSiteName" value="${escapeHtml(siteSettings.siteName||'')}"></div>
        <div class="field"><label>العنوان الرئيسي بصفحة الدخول</label><input id="setHeroTitle" value="${escapeHtml(siteSettings.heroTitle||'')}"></div>
        <div class="field"><label>الوصف تحت العنوان</label><textarea id="setHeroSub" rows="2">${escapeHtml(siteSettings.heroSubtitle||'')}</textarea></div>
        <div class="field">
          <label>رسالة تأكيد الحجز (بتتبعت واتساب للحاجز)</label>
          <textarea id="setBookingMsg" rows="5">${escapeHtml(siteSettings.bookingMessageTemplate||'')}</textarea>
          <div class="trip-meta">تقدر تستخدم: {الاسم} {الرحلة} {المقاعد} {المبلغ} وهيتم استبدالها ببيانات كل حجز تلقائيًا.</div>
        </div>
        <button class="btn block" onclick="saveSiteSettings()">حفظ إعدادات الصفحة الرئيسية</button>
      </div>`;
  }

  app.innerHTML = html;
}

async function handleLogoSelect(input){
  const file = input.files[0];
  if(!file) return;
  input.disabled = true;
  const url = await uploadImageFile(file, 'site', 'setLogoStatus', 'setLogoPreview');
  input.disabled = false;
  if(url) pendingLogoUrl = url;
}

async function saveSiteSettings(){
  const logoUrl = pendingLogoUrl !== null ? pendingLogoUrl : (siteSettings.logoUrl || '');
  const siteName = document.getElementById('setSiteName').value.trim() || 'نظام الرحلات';
  const heroTitle = document.getElementById('setHeroTitle').value.trim();
  const heroSubtitle = document.getElementById('setHeroSub').value.trim();
  const bookingMessageTemplate = document.getElementById('setBookingMsg').value.trim();
  try{
    await db.collection('settings').doc('site').set({logoUrl, siteName, heroTitle, heroSubtitle, bookingMessageTemplate}, {merge:true});
    pendingLogoUrl = null;
    toast('تم حفظ إعدادات الصفحة الرئيسية', 'success');
  }catch(e){ toast('حدث خطأ أثناء الحفظ (تأكد إنك أدمن)', 'error'); }
}

async function approveTrip(tripId){
  const type = document.getElementById(`ctype_${tripId}`).value;
  const val = parseFloat(document.getElementById(`cval_${tripId}`).value);
  if(isNaN(val) || val < 0){ toast('من فضلك حدد قيمة عمولة صحيحة', 'error'); return; }
  if(type==='percent' && val > 100){ toast('النسبة لا يمكن أن تتجاوز 100%', 'error'); return; }
  await db.collection('trips').doc(tripId).update({
    status:'approved', commissionType:type, commissionValue:val
  });
  toast('تم اعتماد الرحلة', 'success');
}

async function rejectTrip(tripId){
  if(!confirm('متأكد من رفض الرحلة؟')) return;
  await db.collection('trips').doc(tripId).update({status:'rejected'});
  toast('تم رفض الرحلة', 'success');
}

function openEditTrip(tripId){
  const t = tripsCache.find(x=>x.id===tripId);
  if(!t) return;
  pendingTripImageUrl = '';
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card">
      <h3>تعديل الرحلة</h3>
      <div class="field"><label>الوجهة</label><input id="eDest" value="${escapeHtml(t.destination)}"></div>
      <div class="field"><label>تاريخ الرحلة</label><input id="eDate" type="date" value="${escapeHtml(t.date||'')}"></div>
      <div class="field"><label>السعر للفرد (جنيه)</label><input id="ePrice" type="number" min="0" value="${t.price}"></div>
      <div class="field"><label>إجمالي المقاعد (لأقل من ${t.seatsBooked||0} محجوز فعليًا)</label><input id="eSeats" type="number" min="${t.seatsBooked||0}" value="${t.seatsTotal}"></div>
      <div class="field">
        <label>صورة الرحلة</label>
        <input type="file" id="eImageFile" accept="image/*" onchange="handleTripImageSelect(this)">
        <div id="pImageStatus" class="trip-meta"></div>
        <img id="pImagePreview" class="trip-img ${t.imageUrl?'':'hidden'}" src="${escapeHtml(t.imageUrl||'')}" alt="معاينة">
      </div>
      <div class="field"><label>رابط الموقع على خرائط جوجل</label><input id="eLocation" value="${escapeHtml(t.locationUrl||'')}"></div>
      <div class="field"><label>ملاحظات</label><textarea id="eNotes" rows="3">${escapeHtml(t.notes||'')}</textarea></div>
      <div class="row">
        <button class="btn block" onclick="saveEditTrip('${t.id}')">حفظ التعديلات</button>
        <button class="btn secondary block" onclick="renderAdmin()">إلغاء</button>
      </div>
    </div>`;
}

async function saveEditTrip(tripId){
  const t = tripsCache.find(x=>x.id===tripId);
  if(!t) return;
  const destination = document.getElementById('eDest').value.trim();
  const date = document.getElementById('eDate').value;
  const price = parseFloat(document.getElementById('ePrice').value);
  const seatsTotal = parseInt(document.getElementById('eSeats').value);
  const locationUrl = document.getElementById('eLocation').value.trim();
  const notes = document.getElementById('eNotes').value.trim();
  const imageUrl = pendingTripImageUrl || t.imageUrl || '';

  if(!destination || !date || isNaN(price) || price < 0 || !Number.isInteger(seatsTotal) || seatsTotal < 1){
    toast('من فضلك املأ كل الحقول المطلوبة بقيم صحيحة', 'error'); return;
  }
  if(seatsTotal < (t.seatsBooked||0)){
    toast(`مينفعش تقلل المقاعد لأقل من ${t.seatsBooked} (عدد المقاعد المحجوزة بالفعل)`, 'error'); return;
  }
  try{
    await db.collection('trips').doc(tripId).update({destination, date, price, seatsTotal, locationUrl, notes, imageUrl});
    toast('تم حفظ التعديلات', 'success');
    pendingTripImageUrl = '';
    renderAdmin();
  }catch(e){ toast('حدث خطأ أثناء الحفظ', 'error'); }
}

async function deleteTrip(tripId){
  const t = tripsCache.find(x=>x.id===tripId);
  if(!t) return;
  if((t.seatsBooked||0) > 0){
    toast('مينفعش تحذف رحلة عليها حجوزات فعّالة. لازم تلغي الحجوزات دي الأول.', 'error');
    return;
  }
  if(!confirm(`متأكد من حذف رحلة "${t.destination}"؟ الإجراء ده نهائي ومينفعش يتراجع.`)) return;
  try{
    await db.collection('trips').doc(tripId).delete();
    toast('تم حذف الرحلة', 'success');
  }catch(e){ toast('تعذر حذف الرحلة', 'error'); }
}

async function toggleTripVisibility(tripId){
  const t = tripsCache.find(x=>x.id===tripId);
  if(!t) return;
  try{
    await db.collection('trips').doc(tripId).update({hidden: !t.hidden});
    toast(t.hidden ? 'الرحلة هتظهر للزوار تاني' : 'الرحلة اتخفت عن الزوار', 'success');
  }catch(e){ toast('تعذر تحديث حالة الظهور', 'error'); }
}

async function markPayment(bookingId){
  const b = bookingsCache.find(x=>x.id===bookingId);
  const amount = prompt(`المبلغ المدفوع من إجمالي ${b.amount} جنيه:`, b.amountPaid||0);
  if(amount===null) return;
  let paid = parseFloat(amount);
  if(isNaN(paid) || paid < 0){ toast('قيمة غير صحيحة', 'error'); return; }
  const status = paid>=b.amount ? 'paid' : paid>0 ? 'partial' : 'unpaid';
  await db.collection('bookings').doc(bookingId).update({amountPaid:paid, paymentStatus:status});
  toast('تم تحديث حالة الدفع', 'success');
}

async function markCommissionPaid(bookingId){
  if(!confirm('تأكيد دفع العمولة للمسوّق؟')) return;
  await db.collection('bookings').doc(bookingId).update({commissionPaid:true});
  toast('تم تسجيل دفع العمولة', 'success');
}

// ---------------- رسالة تأكيد الحجز عبر واتساب ----------------
function buildWhatsAppLink(phone, message){
  let clean = (phone||'').replace(/\D/g,'');
  if(clean.startsWith('0')) clean = '20' + clean.slice(1);
  else if(!clean.startsWith('20')) clean = '20' + clean;
  return `https://wa.me/${clean}?text=${encodeURIComponent(message)}`;
}

function sendBookingMessage(bookingId){
  const b = bookingsCache.find(x=>x.id===bookingId);
  if(!b) return;
  let msg = siteSettings.bookingMessageTemplate || '';
  msg = msg
    .replaceAll('{الاسم}', b.participantName||'')
    .replaceAll('{الرحلة}', b.tripDestination||'')
    .replaceAll('{المقاعد}', b.seats||'')
    .replaceAll('{المبلغ}', b.amount||'');
  window.open(buildWhatsAppLink(b.participantPhone, msg), '_blank');
}

// ---------------- تصدير تقارير Excel ----------------
function downloadExcel(rows, sheetName, filename){
  if(!rows.length){ toast('لا توجد بيانات كافية لعمل التقرير', 'error'); return; }
  try{
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename);
  }catch(e){ toast('تعذر إنشاء ملف الإكسل', 'error'); }
}

function exportBookingsReport(){
  const rows = [];
  tripsCache.forEach(t=>{
    const tripBookings = bookingsCache.filter(b=>b.tripId===t.id);
    const statusAr = t.status==='approved'?'معتمدة':t.status==='rejected'?'مرفوضة':'قيد المراجعة';
    if(tripBookings.length===0){
      rows.push({
        'الوجهة': t.destination, 'التاريخ': t.date, 'سعر الفرد': t.price,
        'إجمالي المقاعد': t.seatsTotal, 'حالة الرحلة': statusAr,
        'اسم الحاجز':'', 'موبايل الحاجز':'', 'عدد المقاعد المحجوزة':'',
        'المبلغ المطلوب':'', 'المدفوع':'', 'حالة الدفع':'', 'ملغي؟':''
      });
    } else {
      tripBookings.forEach(b=>{
        rows.push({
          'الوجهة': t.destination, 'التاريخ': t.date, 'سعر الفرد': t.price,
          'إجمالي المقاعد': t.seatsTotal, 'حالة الرحلة': statusAr,
          'اسم الحاجز': b.participantName, 'موبايل الحاجز': b.participantPhone,
          'عدد المقاعد المحجوزة': b.seats,
          'المبلغ المطلوب': b.amount, 'المدفوع': b.amountPaid||0,
          'حالة الدفع': b.paymentStatus==='paid'?'مدفوع':b.paymentStatus==='partial'?'جزئي':'غير مدفوع',
          'ملغي؟': b.cancelled?'نعم':'لا'
        });
      });
    }
  });
  downloadExcel(rows, 'الرحلات والحجوزات', 'تقرير_الرحلات_والحجوزات.xlsx');
}

async function exportUsersReport(){
  try{
    const snap = await db.collection('users').get();
    const rows = snap.docs.map(d=>{
      const u = d.data();
      const roleAr = u.role==='admin' ? 'أدمن' : u.role==='organizer' ? 'مشرف رحلات' : 'مستخدم';
      return {
        'الاسم': u.name||'',
        'البريد الإلكتروني': u.email||'',
        'الدور': roleAr,
        'تاريخ التسجيل': u.createdAt ? new Date(u.createdAt).toLocaleDateString('ar-EG') : ''
      };
    });
    downloadExcel(rows, 'المشتركين', 'تقرير_المشتركين.xlsx');
  }catch(e){ toast('تعذر تجهيز تقرير المشتركين', 'error'); }
}
</script>
